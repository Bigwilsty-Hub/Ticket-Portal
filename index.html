<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Portal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #050505;
  min-height: 100%;
  font-family: Arial, sans-serif;
  color: white;
}

body {
  overflow-x: hidden;
}

#loader {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 25px;
  box-sizing: border-box;
}

.card {
  width: 100%;
  max-width: 430px;
  border: 1px solid #333;
  border-radius: 18px;
  padding: 30px 22px;
  background: linear-gradient(180deg, #111, #050505);
  box-shadow: 0 0 35px rgba(255,255,255,0.08);
}

.badge {
  font-size: 14px;
  letter-spacing: 2px;
  color: #f5c542;
  margin-bottom: 15px;
}

h1 {
  font-size: 30px;
  margin: 0 0 12px;
}

#status {
  font-size: 17px;
  color: #ddd;
  margin: 25px 0 18px;
}

.bar {
  height: 14px;
  background: #222;
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f5c542, #ffffff);
  animation: load 3s forwards;
}

@keyframes load {
  from { width: 0%; }
  to { width: 100%; }
}

.small {
  margin-top: 18px;
  font-size: 13px;
  color: #999;
}

#blackout {
  display: none;
  min-height: 100vh;
  background: black;
}

#reveal {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: black;
  min-height: 100vh;
  padding: 18px;
  box-sizing: border-box;
  overflow-y: auto;
}

#reveal img {
  width: 100%;
  max-width: 950px;
  max-height: 68vh;
  object-fit: contain;
}

#joke {
  width: 100%;
  max-width: 900px;
  text-align: center;
  margin-top: 22px;
  background: rgba(0,0,0,0.78);
  padding: 16px;
  border-radius: 14px;
  opacity: 0;
  animation: showJoke 0.9s ease forwards;
  animation-delay: 1.2s;
}

.big {
  font-size: clamp(24px, 6vw, 48px);
  font-weight: bold;
  color: #ff2a2a;
  line-height: 1.15;
}

.smalljoke {
  margin-top: 10px;
  font-size: clamp(16px, 4vw, 25px);
  color: white;
  line-height: 1.25;
}

@keyframes showJoke {
  to { opacity: 1; }
}

@media (max-height: 760px) {
  #reveal {
    justify-content: flex-start;
    padding-top: 12px;
  }

  #reveal img {
    max-height: 56vh;
  }

  #joke {
    margin-top: 14px;
    padding: 13px;
  }
}
</style>
</head>

<body>

<div id="loader">
  <div class="card">
    <div class="badge">VIP TICKET PORTAL</div>
    <h1>World Cup 2026</h1>
    <div id="status">Checking FIFA ticket database...</div>
    <div class="bar">
      <div class="fill"></div>
    </div>
    <div class="small">Do not close this page</div>
  </div>
</div>

<div id="blackout"></div>

<div id="reveal">
  <img src="Scary.png" alt="">
  <div id="joke">
    <div class="big">😂 So Na You Be The Secret Millionaire Wey We Get For This House?</div>
    <div class="smalljoke">AH DON CASH YOU, TINYERE FATHER IHE NA BOOT OZUGBO. 🤣🤣</div>
  </div>
</div>

<script>
const statusText = document.getElementById("status");

setTimeout(() => {
  statusText.innerText = "Authenticating reservation...";
}, 1000);

setTimeout(() => {
  statusText.innerText = "Confirming payment eligibility...";
}, 2000);

setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("blackout").style.display = "block";
}, 3200);

setTimeout(() => {
    document.getElementById("scream").play().catch(() => {});
}, 4350);

setTimeout(() => {
    document.getElementById("blackout").style.display = "none";
    document.getElementById("reveal").style.display = "flex";
}, 4400);
</script>

  <audio id="scream" preload="auto">
    <source src="scream.mp3" type="audio/mpeg">
</audio>

</body>
</html>
